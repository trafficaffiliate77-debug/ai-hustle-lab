<!DOCTYPE html>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #0F172A; background: white; }
        nav { background: white; border-bottom: 1px solid #E2E8F0; padding: 16px 20px; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-weight: 800; color: #0F172A; text-decoration: none; font-size: 1.1rem; }

        .container { max-width: 600px; margin: 0 auto; padding: 60px 20px; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 16px; text-align: center; }
        .subtitle { text-align: center; color: #64748B; margin-bottom: 50px; }
        .contact-form { background: #F8FAFC; padding: 32px; border-radius: 16px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
        input, textarea { width: 100%; padding: 12px 16px; border: 2px solid #E2E8F0; border-radius: 8px; font-size: 16px; font-family: inherit; outline: none; transition: border 0.2s; }
        input:focus, textarea:focus { border-color: #2563EB; }
        textarea { resize: vertical; min-height: 120px; }
        button { background: #2563EB; color: white; border: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: all 0.2s; }
        button:hover { background: #1E40AF; }
        .email-direct { text-align: center; margin-top: 30px; padding-top: 30px; border-top: 1px solid #E2E8F0; color: #64748B; }

        @media (max-width: 600px) { .nav-links a:not(:last-child) { display: none; } }

            <div class="form-group">

            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
